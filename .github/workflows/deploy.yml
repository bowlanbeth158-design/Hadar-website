# ─────────────────────────────────────────────────────────────────────────────
# Deploy — pushe l'image sur le DigitalOcean Container Registry et SSH
# sur le Droplet pour redéployer.
#
# Déclenchement :
#   - Tag sur main qui matche v* (ex: v1.0.0, v1.0.1-rc.1)
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   DO_REGISTRY_TOKEN    Personal Access Token DigitalOcean (read+write registry)
#   DO_REGISTRY_NAME     Nom du registry (ex: registry.digitalocean.com/hadar)
#   DEPLOY_SSH_HOST      IP du droplet
#   DEPLOY_SSH_USER      Utilisateur SSH (ex: deploy)
#   DEPLOY_SSH_KEY       Clé SSH privée (PEM)
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build & push & deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Login DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DO_REGISTRY_TOKEN }}
          password: ${{ secrets.DO_REGISTRY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DO_REGISTRY_NAME }}/hadar:${{ github.ref_name }}
            ${{ secrets.DO_REGISTRY_NAME }}/hadar:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SSH deploy
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          REGISTRY_NAME: ${{ secrets.DO_REGISTRY_NAME }}
          REGISTRY_TOKEN: ${{ secrets.DO_REGISTRY_TOKEN }}
        run: |
          # Setup SSH directement (plus robuste que les actions tierces
          # qui ont parfois des problèmes avec ed25519).
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Vérifie que la clé est bien parsable avant la connexion.
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null

          # Exécute les commandes de déploiement sur le droplet.
          # `<<EOF` (sans quotes) → les vars sont substituées CÔTÉ
          # local avant l'envoi sur le droplet.
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
              "$SSH_USER@$SSH_HOST" bash -s <<EOF
            set -e
            cd /opt/hadar

            # Login docker au DigitalOcean Container Registry pour
            # pouvoir pull les images privées.
            echo "$REGISTRY_TOKEN" | docker login registry.digitalocean.com \\
              --username "$REGISTRY_TOKEN" --password-stdin

            docker pull "$REGISTRY_NAME/hadar:latest"
            # Migrate via prisma 5.22 (épinglé) — évite que npx
            # télécharge la dernière v7.x qui rejette \`url = env(...)\`
            # dans schema.prisma.
            docker run --rm \\
              --env-file /opt/hadar/.env.production \\
              "$REGISTRY_NAME/hadar:latest" \\
              sh -c "cd /app && npx -y prisma@5.22.0 migrate deploy"
            docker compose -f /opt/hadar/docker-compose.prod.yml pull app
            docker compose -f /opt/hadar/docker-compose.prod.yml up -d app
            docker image prune -af --filter "until=168h"
          EOF
