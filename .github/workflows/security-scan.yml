# ─────────────────────────────────────────────────────────────────────────────
# Security scans — Semgrep (SAST) + npm audit + secrets detection.
#
# Lance sur chaque PR vers main + chaque push sur main + nightly.
# ─────────────────────────────────────────────────────────────────────────────

name: Security scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *' # tous les jours 03:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: |
          semgrep ci \
            --config=p/typescript \
            --config=p/react \
            --config=p/nodejs \
            --config=p/owasp-top-ten \
            --config=p/secrets \
            --sarif --output=semgrep.sarif || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  trufflehog:
    name: TruffleHog (secrets)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --only-verified
