# ─────────────────────────────────────────────────────────────────────────────
# Deploy — pushe l'image sur le DigitalOcean Container Registry et SSH
# sur le Droplet pour redéployer.
#
# Déclenchement :
#   - Tag sur main qui matche v* (ex: v1.0.0, v1.0.1-rc.1)
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   DO_REGISTRY_TOKEN    Personal Access Token DigitalOcean (read+write registry)
#   DO_REGISTRY_NAME     Nom du registry (ex: registry.digitalocean.com/hadar)
#   DEPLOY_SSH_HOST      IP du droplet
#   DEPLOY_SSH_USER      Utilisateur SSH (ex: deploy)
#   DEPLOY_SSH_KEY       Clé SSH privée (PEM)
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build & push & deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Login DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DO_REGISTRY_TOKEN }}
          password: ${{ secrets.DO_REGISTRY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DO_REGISTRY_NAME }}/hadar:${{ github.ref_name }}
            ${{ secrets.DO_REGISTRY_NAME }}/hadar:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/hadar

            # Pull + restart via docker compose. Le compose en prod
            # ne contient que le service "app" (Postgres et Redis sont
            # managés DigitalOcean).
            docker pull ${{ secrets.DO_REGISTRY_NAME }}/hadar:latest

            # Migrate avant de bascule (zero-downtime acceptable car
            # nos migrations sont backward-compatible jusqu'au prochain
            # major).
            docker run --rm \
              --env-file /opt/hadar/.env.production \
              ${{ secrets.DO_REGISTRY_NAME }}/hadar:latest \
              sh -c "cd /app && npx prisma migrate deploy"

            # Restart app container.
            docker compose -f /opt/hadar/docker-compose.prod.yml pull app
            docker compose -f /opt/hadar/docker-compose.prod.yml up -d app

            # Cleanup vieilles images.
            docker image prune -af --filter "until=168h"
